<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIEL | Micro-OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --cyan: #00ffd6;
            --bg: #030507;
            --panel: #0a0e14;
            --border: #1a2333;
        }

        /* Strict NO-SCROLL Body */
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
            color: #fff;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
            display: flex;
            flex-direction: column;
        }

        /* Scrollbars (Hidden or Micro) */
        ::-webkit-scrollbar { width: 2px; height: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 214, 0.3); border-radius: 2px; }

        /* Micro Components */
        .top-bar { height: 40px; flex-shrink: 0; border-bottom: 1px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; padding: 0 10px; background: #000; box-shadow: 0 1px 10px rgba(0,255,214,0.1); }
        .analytics-strip { height: 24px; flex-shrink: 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 10px; background: var(--panel); color: var(--cyan); font-size: 9px; }
        .client-gen { height: 36px; flex-shrink: 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; gap: 8px; background: #000; }
        
        /* The ONLY scrollable area */
        .keys-list-container { flex-grow: 1; overflow-y: auto; overflow-x: hidden; background: var(--bg); position: relative; }
        
        .list-row { display: flex; align-items: center; justify-content: space-between; height: 40px; border-bottom: 1px solid var(--border); padding: 0 10px; }
        .list-row:hover { background: rgba(0, 255, 214, 0.05); }
        
        /* Mini Terminal */
        .mini-terminal { height: 25vh; flex-shrink: 0; border-top: 1px solid var(--cyan); background: #010203; overflow-y: auto; padding: 6px; font-size: 9px; color: #4ade80; line-height: 1.3; box-shadow: 0 -2px 10px rgba(0,255,214,0.05); }

        /* Form Elements */
        input { background: var(--panel); border: 1px solid var(--border); color: var(--cyan); height: 24px; padding: 0 8px; outline: none; border-radius: 3px; font-family: inherit; font-size: 10px; }
        input:focus { border-color: var(--cyan); }
        
        .btn-micro { height: 24px; min-width: 24px; display: inline-flex; align-items: center; justify-content: center; background: var(--panel); border: 1px solid var(--border); color: white; border-radius: 3px; cursor: pointer; }
        .btn-micro:active { background: var(--cyan); color: #000; }
        .btn-micro.cyan { background: rgba(0,255,214,0.1); border-color: var(--cyan); color: var(--cyan); }
        .btn-micro.cyan:active { background: var(--cyan); color: #000; }

        /* Icons */
        .icon { width: 12px; height: 12px; }
        .icon-btn { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; color: #888; cursor: pointer; transition: color 0.2s; }
        .icon-btn:hover, .icon-btn:active { color: var(--cyan); }
        .icon-btn.danger:hover, .icon-btn.danger:active { color: #ef4444; }

        /* Overlays & Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .hide { display: none !important; }
        .modal-box { background: var(--bg); border: 1px solid var(--cyan); padding: 15px; width: 280px; box-shadow: 0 0 20px rgba(0,255,214,0.1); border-radius: 4px; }
        
        /* Dropdown */
        .dropdown { position: absolute; right: 5px; top: 35px; background: var(--panel); border: 1px solid var(--cyan); border-radius: 3px; z-index: 50; flex-direction: column; width: 120px; }
        .dropdown button { background: none; border: none; color: white; text-align: left; padding: 8px 10px; font-family: inherit; font-size: 10px; width: 100%; border-bottom: 1px solid var(--border); }
        .dropdown button:last-child { border-bottom: none; }
        .dropdown button:hover { background: rgba(0,255,214,0.1); color: var(--cyan); }

        /* Toast */
        #toast { position: fixed; top: 45px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 9px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999; }
        #toast.show { opacity: 1; }

        /* Blink Anim */
        @keyframes blink { 50% { opacity: 0; } }
        .blinking { animation: blink 1s infinite; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <!-- Login -->
    <div id="login-overlay" class="overlay">
        <div class="modal-box text-center">
            <div class="w-8 h-8 rounded-full border border-[var(--cyan)] mx-auto mb-3 flex items-center justify-center shadow-[0_0_10px_var(--cyan)]">
                <div class="w-4 h-4 bg-[var(--cyan)] rounded-full"></div>
            </div>
            <div class="mb-4 text-[var(--cyan)] tracking-widest text-xs">CIEL SYS_AUTH</div>
            <input type="password" id="pin-input" placeholder="PASSCODE" class="w-full text-center tracking-widest mb-4" onkeydown="if(event.key==='Enter') login()">
            <button onclick="login()" class="btn-micro cyan w-full">UNLOCK</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="hide flex flex-col h-full w-full">
        
        <!-- 1. Top Bar -->
        <div class="top-bar">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-[var(--cyan)] rounded-full shadow-[0_0_5px_var(--cyan)]"></div>
                <span class="font-bold tracking-widest text-[var(--cyan)]">CIEL</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <div class="text-[8px] text-gray-500 leading-none">TOTAL BALANCE</div>
                    <div class="text-[var(--cyan)] font-bold"><span id="stat-total-pollen">0.000</span> P</div>
                </div>
                <div class="icon-btn" onclick="refreshAll()" title="Refresh">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </div>
                <div class="icon-btn" onclick="toggleMenu()">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
                </div>
            </div>
            
            <div id="dropdown-menu" class="dropdown hide">
                <button onclick="showAddModal(); toggleMenu()">+ Add Node</button>
                <button onclick="showPasswordModal(); toggleMenu()">Change Pass</button>
                <button onclick="logout()" class="text-red-400">Logout</button>
            </div>
        </div>

        <!-- 2. Analytics Strip -->
        <div class="analytics-strip">
            <div>24H: <span id="ana-today" class="text-white">0</span></div>
            <div>7D: <span id="ana-week" class="text-white">0</span></div>
            <div>30D: <span id="ana-month" class="text-white">0</span></div>
            <div>ACT: <span id="stat-active-keys" class="text-white">0</span></div>
        </div>

        <!-- 3. Client Gen -->
        <div class="client-gen">
            <span class="text-gray-500 text-[9px] w-12 shrink-0">AGENT_ID</span>
            <input type="text" id="new-client-name" placeholder="Name..." class="flex-1">
            <button onclick="addClientKey()" class="btn-micro cyan">+</button>
        </div>

        <!-- 4. Upstream Keys List (Scrollable) -->
        <div class="keys-list-container" id="keys-list">
            <!-- Rows injected here -->
        </div>

        <!-- 5. Mini Terminal (Fixed 25% Bottom) -->
        <div class="mini-terminal" id="console-output">
            <!-- Logs -->
        </div>

    </div> <!-- End App -->

    <!-- Modals -->
    <div id="add-modal" class="overlay hide">
        <div class="modal-box">
            <div class="text-[var(--cyan)] mb-2">ADD UPSTREAM NODE</div>
            <input type="text" id="new-key" placeholder="sk-..." class="w-full mb-2">
            <div class="flex gap-2 mb-3">
                <span class="text-[9px] text-gray-400 leading-[24px]">PRIORITY:</span>
                <input type="number" id="new-priority" value="0" class="flex-1">
            </div>
            <div class="flex gap-2">
                <button onclick="hideAddModal()" class="btn-micro flex-1">CANCEL</button>
                <button onclick="addKey()" class="btn-micro cyan flex-1">SAVE</button>
            </div>
        </div>
    </div>

    <div id="password-modal" class="overlay hide">
        <div class="modal-box">
            <div class="text-red-400 mb-2">SYS_PASS OVERRIDE</div>
            <input type="password" id="new-password" placeholder="NEW PIN" class="w-full mb-4">
            <div class="flex gap-2">
                <button onclick="hidePasswordModal()" class="btn-micro flex-1">CANCEL</button>
                <button onclick="changePassword()" class="btn-micro flex-1 !border-red-400 !text-red-400">UPDATE</button>
            </div>
        </div>
    </div>

    <div id="new-client-key-modal" class="overlay hide">
        <div class="modal-box !border-[#00ffd6]">
            <div class="text-[#00ffd6] mb-1">AGENT KEY GENERATED</div>
            <div class="text-[8px] text-red-400 mb-2">COPY NOW. NO RECOVERY.</div>
            <input type="text" id="display-new-client-key" readonly class="w-full mb-3 text-center !text-[#00ffd6]">
            <div class="flex gap-2">
                <button onclick="copyToClipboard('display-new-client-key')" class="btn-micro cyan flex-1">COPY</button>
                <button onclick="closeNewClientKeyModal()" class="btn-micro flex-1">DONE</button>
            </div>
        </div>
    </div>

    <script>
        let sessionToken = localStorage.getItem('ciel_session') || '';
        let logInterval = null;

        // UI Utils
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.innerText = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }
        function toggleMenu() { document.getElementById('dropdown-menu').classList.toggle('hide'); }
        document.addEventListener('click', (e) => {
            const m = document.getElementById('dropdown-menu');
            if(!m.classList.contains('hide') && !e.target.closest('.top-bar')) m.classList.add('hide');
        });

        // Copy
        function copyText(txt) { navigator.clipboard.writeText(txt).then(() => showToast('COPIED')).catch(() => showToast('ERR_COPY')); }
        function copyToClipboard(id) { copyText(document.getElementById(id).value); }

        // Auth
        window.onload = async () => { if(sessionToken) checkAuth(); };
        async function checkAuth() {
            try {
                const res = await fetch('/admin/live_status', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                if(res.ok) showApp(); else logout();
            } catch(e) { logout(); }
        }
        async function login() {
            const pin = document.getElementById('pin-input').value;
            try {
                const res = await fetch('/admin/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({pin}) });
                if(res.ok) {
                    sessionToken = (await res.json()).token;
                    localStorage.setItem('ciel_session', sessionToken);
                    showApp();
                } else showToast('INVALID_PIN');
            } catch(e) { showToast('NET_ERR'); }
        }
        function logout() {
            sessionToken = ''; localStorage.removeItem('ciel_session');
            if(logInterval) clearInterval(logInterval);
            document.getElementById('app').classList.add('hide');
            document.getElementById('login-overlay').classList.remove('hide');
            document.getElementById('pin-input').value = '';
        }
        function showApp() {
            document.getElementById('login-overlay').classList.add('hide');
            document.getElementById('app').classList.remove('hide');
            refreshAll();
            startLogPolling();
        }

        function refreshAll() { refreshData(); refreshAnalytics(); }

        // Data
        async function refreshAnalytics() {
            try {
                const res = await fetch('/admin/analytics', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                if(!res.ok) return;
                const d = await res.json();
                document.getElementById('ana-today').innerText = d.today;
                document.getElementById('ana-week').innerText = d.this_week;
                document.getElementById('ana-month').innerText = d.this_month;
            } catch(e) {}
        }

        async function refreshData() {
            try {
                // Fetch Upstream
                const resKeys = await fetch('/admin/keys', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                if(resKeys.status===401) return logout();
                const dataKeys = await resKeys.json();
                
                // Fetch Clients
                const resClients = await fetch('/admin/client-keys', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                const dataClients = await resClients.json();

                const list = document.getElementById('keys-list');
                list.innerHTML = '';
                
                let total = 0, active = 0;

                // Render Upstream Keys
                dataKeys.keys.forEach((k, i) => {
                    const isHealthy = k.balance > 0;
                    if(isHealthy) active++;
                    total += (isHealthy ? k.balance : 0);
                    const idPref = `k-${i}`;
                    
                    list.innerHTML += `
                        <div class="list-row">
                            <div class="flex items-center gap-2 overflow-hidden w-2/5">
                                <div class="w-1.5 h-1.5 rounded-full shrink-0 ${isHealthy ? 'bg-[var(--cyan)]' : 'bg-red-500'}"></div>
                                <div class="truncate text-gray-300">${k.key.substring(0,8)}...${k.key.substring(k.key.length-3)}</div>
                            </div>
                            <div class="w-1/4 text-center ${isHealthy ? 'text-white' : 'text-red-400'}" id="bal-${idPref}">${k.balance.toFixed(2)}</div>
                            <div class="flex items-center gap-1 w-[60px] justify-end">
                                <div class="icon-btn" onclick="copyText('${k.key}')"><svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></div>
                                <div class="icon-btn" onclick="testKeyInline('${k.key}', 'bal-${idPref}')"><svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></div>
                                <div class="icon-btn danger" onclick="deleteKey('${k.key}')"><svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('stat-active-keys').innerText = active;
                document.getElementById('stat-total-pollen').innerText = total.toFixed(3);

                // Divider if clients exist
                if(dataClients.keys.length > 0) {
                    list.innerHTML += `<div class="bg-[var(--panel)] text-[8px] text-gray-500 px-2 py-1 border-b border-[var(--border)]">CLIENT AGENTS</div>`;
                }

                // Render Client Keys
                dataClients.keys.forEach(k => {
                    list.innerHTML += `
                        <div class="list-row !border-l-2 !border-l-[#8b5cf6]">
                            <div class="flex items-center gap-2 overflow-hidden w-2/5">
                                <div class="truncate text-[#8b5cf6] font-bold">${k.name}</div>
                            </div>
                            <div class="w-1/4 text-center text-gray-500 text-[9px] truncate">${k.key.substring(0,6)}...</div>
                            <div class="flex items-center gap-1 w-[60px] justify-end">
                                <div class="icon-btn" onclick="copyText('${k.key}')"><svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></div>
                                <div class="icon-btn danger" onclick="deleteClientKey('${k.key}')"><svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></div>
                            </div>
                        </div>
                    `;
                });

            } catch(e) {}
        }

        async function testKeyInline(key, id) {
            const el = document.getElementById(id);
            const orig = el.innerText;
            el.innerText = '...'; el.classList.add('blinking', '!text-[var(--cyan)]');
            try {
                const res = await fetch(`/admin/test/${key}`, { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                const d = await res.json();
                el.classList.remove('blinking');
                if(d.success) { el.innerText = d.balance.toFixed(2); el.classList.replace('!text-[var(--cyan)]', 'text-white'); showToast('VERIFIED'); refreshAll(); }
                else { el.innerText = '0.00'; el.classList.replace('!text-[var(--cyan)]', 'text-red-400'); showToast('DEAD'); }
            } catch(e) { el.classList.remove('blinking'); el.innerText = orig; showToast('ERR'); }
        }

        // Terminal
        function startLogPolling() { if(logInterval) clearInterval(logInterval); fetchLogs(); logInterval=setInterval(fetchLogs, 4000); }
        async function fetchLogs() {
            try {
                const res = await fetch('/admin/live_status', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                if(res.ok) {
                    const d = await res.json();
                    const c = document.getElementById('console-output');
                    const wasBottom = (c.scrollHeight - c.scrollTop <= c.clientHeight + 10);
                    c.innerHTML = d.logs.join('<br>') + '<span class="blinking">_</span>';
                    if(wasBottom) c.scrollTop = c.scrollHeight;
                }
            } catch(e) {}
        }

        // Modals & API calls
        function showAddModal() { document.getElementById('add-modal').classList.remove('hide'); }
        function hideAddModal() { document.getElementById('add-modal').classList.add('hide'); document.getElementById('new-key').value=''; }
        function showPasswordModal() { document.getElementById('password-modal').classList.remove('hide'); }
        function hidePasswordModal() { document.getElementById('password-modal').classList.add('hide'); document.getElementById('new-password').value=''; }
        function closeNewClientKeyModal() { document.getElementById('new-client-key-modal').classList.add('hide'); }

        async function addKey() {
            const key = document.getElementById('new-key').value;
            const prio = document.getElementById('new-priority').value;
            if(!key) return showToast('REQ_KEY');
            await fetch('/admin/keys', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${sessionToken}`}, body:JSON.stringify({key, priority:parseInt(prio)}) });
            hideAddModal(); refreshData(); showToast('ADDED');
        }
        async function deleteKey(key) {
            if(!confirm('PURGE NODE?')) return;
            await fetch(`/admin/keys/${key}`, { method:'DELETE', headers:{'Authorization':`Bearer ${sessionToken}`} });
            refreshData(); showToast('PURGED');
        }
        async function addClientKey() {
            const name = document.getElementById('new-client-name').value;
            if(!name) return showToast('REQ_NAME');
            const res = await fetch('/admin/client-keys', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${sessionToken}`}, body:JSON.stringify({name}) });
            if(res.ok) {
                const d = await res.json();
                document.getElementById('new-client-name').value = '';
                document.getElementById('display-new-client-key').value = d.key;
                document.getElementById('new-client-key-modal').classList.remove('hide');
                refreshData(); showToast('AGENT_INIT');
            }
        }
        async function deleteClientKey(key) {
            if(!confirm('PURGE AGENT?')) return;
            await fetch(`/admin/client-keys/${key}`, { method:'DELETE', headers:{'Authorization':`Bearer ${sessionToken}`} });
            refreshData(); showToast('PURGED');
        }
        async function changePassword() {
            const np = document.getElementById('new-password').value;
            if(!np) return showToast('REQ_PASS');
            const res = await fetch('/admin/password', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${sessionToken}`}, body:JSON.stringify({new_password:np}) });
            if(res.ok) { showToast('PASS_UPDATED'); hidePasswordModal(); }
        }
    </script>
</body>
</html>
