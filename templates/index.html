<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIEL | Premium Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-cyan: #00ffd6;
            --neon-violet: #8b5cf6;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            background-color: #050510; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
        }

        /* --- THE CSS SCALING TRICK --- */
        #main-wrapper {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            transform-origin: top left;
            position: relative;
            z-index: 1;
        }
        
        @media (max-width: 1023px) {
            #main-wrapper {
                width: 166vw; /* Compensate for scaling (100 / 0.6) */
                height: 166vh;
                transform: scale(0.60); /* Zooms out the entire UI */
                padding-bottom: 50px;
            }
        }

        /* Animated Liquid Background */
        .liquid-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: linear-gradient(135deg, #090614 0%, #171030 50%, #051421 100%);
        }
        .liquid-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
            opacity: 0.6;
        }
        .blob-1 { width: 50vw; height: 50vw; background: rgba(0, 255, 214, 0.15); top: -10%; left: -10%; }
        .blob-2 { width: 40vw; height: 40vw; background: rgba(139, 92, 246, 0.15); bottom: -10%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 30vw; height: 30vw; background: rgba(255, 0, 128, 0.15); top: 30%; right: 20%; animation-delay: -10s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        /* Premium Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Glowing AI Core Logo */
        .ai-core {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, var(--neon-cyan) 30%, transparent 80%);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.8), 0 0 20px var(--neon-cyan);
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
            animation: core-breathe 4s infinite alternate ease-in-out;
            flex-shrink: 0;
        }
        .ai-core::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            border: 1px solid var(--neon-cyan);
            border-left-color: transparent;
            animation: spin 3s linear infinite;
            opacity: 0.7;
        }
        @keyframes core-breathe {
            0% { box-shadow: inset 0 0 10px rgba(255,255,255,0.5), 0 0 15px var(--neon-cyan); transform: scale(0.95); }
            100% { box-shadow: inset 0 0 25px rgba(255,255,255,1), 0 0 35px var(--neon-cyan), 0 0 50px rgba(0,255,214,0.4); transform: scale(1.05); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- EXACT UIVERSE 3D CARDS (Smit-Prajapati) --- */
        .parent-3d {
            width: 290px;
            height: 300px;
            perspective: 1000px;
            margin: 0 auto;
        }
        .card-3d {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(135deg, rgb(0, 255, 214) 0%, rgb(8, 226, 96) 100%);
            transition: all 0.5s ease-in-out;
            transform-style: preserve-3d;
            box-shadow: rgba(5, 71, 17, 0) 40px 50px 25px -40px, rgba(5, 71, 17, 0.2) 0px 25px 25px -5px;
            position: relative;
        }
        .card-3d.dead {
            background: linear-gradient(135deg, rgb(255, 50, 50) 0%, rgb(150, 0, 0) 100%);
        }
        .card-3d.priority {
            background: linear-gradient(135deg, rgb(65, 88, 208) 0%, rgb(200, 80, 192) 100%);
        }
        .card-glass {
            transform-style: preserve-3d;
            position: absolute;
            inset: 8px;
            border-radius: 55px;
            border-top-right-radius: 100%;
            background: linear-gradient(0deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.4) 100%);
            transform: translate3d(0px, 0px, 25px);
            border-left: 1px solid rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            transition: all 0.5s ease-in-out;
            pointer-events: none;
        }
        .card-content {
            padding: 80px 30px 0px 20px;
            transform: translate3d(0, 0, 26px);
            pointer-events: none;
            position: absolute;
            width: 100%;
        }
        .card-content .card-title {
            display: block;
            color: #0f172a;
            font-weight: 900;
            font-size: 18px;
            word-break: break-all;
            margin-bottom: 5px;
        }
        .card-content .card-text {
            display: block;
            color: rgba(15, 23, 42, 0.8);
            font-size: 14px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .card-bottom {
            padding: 10px 12px;
            transform-style: preserve-3d;
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transform: translate3d(0, 0, 26px);
            z-index: 10;
        }
        .card-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.4);
            color: #0f172a;
            font-weight: bold;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .card-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
        .card-btn.danger { background: rgba(255,0,0,0.1); color: #ffcccc; border-color: rgba(255,0,0,0.3); }
        .card-btn.danger:hover { background: rgba(255,0,0,0.4); color: white; }

        .parent-3d:hover .card-3d {
            transform: rotate3d(1, 1, 0, 25deg);
            box-shadow: rgba(5, 71, 17, 0.3) 30px 50px 25px -40px, rgba(5, 71, 17, 0.1) 0px 25px 30px 0px;
        }

        /* Top Bar Layout */
        .dashboard-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Progress Bars */
        .prog-container { width: 100%; display: flex; gap: 15px; }
        .prog-box { flex: 1; background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 12px; border: 1px solid var(--glass-border); }
        .prog-bg { background-color: rgba(255,255,255,0.1); border-radius: 9999px; height: 8px; overflow: hidden; margin-top: 8px; }
        .prog-fill { background: linear-gradient(90deg, var(--neon-violet), var(--neon-cyan)); height: 100%; transition: width 1s ease-out; }

        /* Terminal Fixed at Bottom */
        .terminal-panel {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--neon-cyan);
            height: 250px;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
        }
        
        .ciel-input {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white;
            padding: 0.75rem 1rem; border-radius: 8px; outline: none; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace; width: 100%;
        }
        .ciel-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,255,214,0.2); }
        .ciel-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white;
            font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 8px; transition: all 0.2s; cursor: pointer;
        }
        .ciel-btn:hover { background: rgba(0,255,214,0.2); border-color: var(--neon-cyan); color: var(--neon-cyan); }

        /* Premium Glass Toasts */
        #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast {
            background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-left: 4px solid var(--neon-cyan);
            color: white; padding: 12px 16px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 10px;
            transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.error { border-left-color: #ef4444; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .hide { display: none !important; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>
<body>
    <div class="liquid-bg">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
        <div class="liquid-blob blob-3"></div>
    </div>

    <div id="toast-container"></div>

    <!-- Login -->
    <div id="login-overlay" class="overlay">
        <div class="glass-panel p-10 w-full max-w-sm text-center">
            <div class="ai-core mx-auto mb-8"></div>
            <h1 class="text-3xl font-bold mb-2 tracking-widest text-white">CIEL</h1>
            <p class="text-xs text-slate-400 mb-8 font-mono tracking-widest">SYSTEM AUTHORIZATION</p>
            <input type="password" id="pin-input" placeholder="PASSCODE" class="ciel-input text-center text-2xl tracking-widest mb-6" onkeydown="if(event.key==='Enter') login()">
            <button onclick="login()" class="ciel-btn w-full !bg-[var(--neon-cyan)] !text-black !border-[var(--neon-cyan)] hover:!bg-white">AUTHENTICATE</button>
        </div>
    </div>

    <!-- MAIN SCALABLE WRAPPER -->
    <div id="main-wrapper" class="hide opacity-0 transition-opacity duration-700">
        
        <div class="dashboard-layout pb-[260px]">
            
            <!-- Header Row -->
            <div class="glass-panel p-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="ai-core"></div>
                    <div>
                        <h1 class="text-3xl font-bold leading-none">CIEL</h1>
                        <p class="text-xs font-mono text-[#00ffd6] tracking-widest mt-1">COMMAND CENTER</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-[10px] font-mono text-slate-400 mb-1">TOTAL POOL</p>
                        <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-[#00ffd6] leading-none" id="stat-total-pollen">0.00</h2>
                    </div>
                    
                    <div class="flex gap-2 relative">
                        <button onclick="refreshAll()" class="p-3 bg-white/5 hover:bg-[#00ffd6]/20 rounded-xl text-white hover:text-[#00ffd6] transition-colors" title="Sync">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                        <button onclick="toggleMenu()" class="p-3 bg-white/5 hover:bg-white/20 rounded-xl text-white transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
                        </button>
                        <!-- Dropdown -->
                        <div id="dropdown-menu" class="absolute right-0 top-full mt-2 w-48 glass-panel py-2 hide z-50 flex flex-col">
                            <button onclick="showAddModal(); toggleMenu()" class="px-4 py-3 text-left hover:bg-[#00ffd6]/10 text-sm text-[#00ffd6] font-bold">Add Node</button>
                            <button onclick="showClientModal(); toggleMenu()" class="px-4 py-3 text-left hover:bg-[#00ffd6]/10 text-sm text-white">Add Agent</button>
                            <button onclick="showPasswordModal(); toggleMenu()" class="px-4 py-3 text-left hover:bg-white/10 text-sm text-slate-300">Change Pass</button>
                            <button onclick="logout()" class="px-4 py-3 text-left hover:bg-red-500/10 text-sm text-red-400 border-t border-white/10">Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Analytics Strip -->
            <div class="glass-panel p-6">
                <div class="flex items-center gap-2 mb-4">
                    <svg class="w-5 h-5 text-[#8b5cf6]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <h3 class="text-base font-bold tracking-wider">USAGE TRAFFIC</h3>
                </div>
                <div class="prog-container">
                    <div class="prog-box">
                        <div class="flex justify-between text-xs font-mono text-slate-300 mb-1"><span>24H CYCLE</span><span id="ana-today" class="font-bold text-white">0</span></div>
                        <div class="prog-bg"><div class="prog-fill" id="bar-today" style="width: 0%"></div></div>
                    </div>
                    <div class="prog-box">
                        <div class="flex justify-between text-xs font-mono text-slate-300 mb-1"><span>7D CYCLE</span><span id="ana-week" class="font-bold text-white">0</span></div>
                        <div class="prog-bg"><div class="prog-fill" id="bar-week" style="width: 0%"></div></div>
                    </div>
                    <div class="prog-box">
                        <div class="flex justify-between text-xs font-mono text-slate-300 mb-1"><span>30D CYCLE</span><span id="ana-month" class="font-bold text-white">0</span></div>
                        <div class="prog-bg"><div class="prog-fill" id="bar-month" style="width: 0%"></div></div>
                    </div>
                </div>
            </div>

            <!-- Upstream Keys 3D Grid -->
            <div class="flex flex-wrap gap-8 justify-center mt-4" id="keys-grid">
                <!-- 3D Cards Inject Here -->
            </div>
            
            <div class="mt-8 text-center text-xs text-slate-500 font-mono tracking-widest uppercase pb-10">End of Node List</div>

        </div> <!-- End Layout -->

        <!-- Fixed Terminal Footer -->
        <div class="terminal-panel flex flex-col">
            <div class="p-3 border-b border-white/10 bg-black/60 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="ml-3 text-xs font-mono text-[#00ffd6] tracking-widest">SYS_CONSOLE</span>
                </div>
                <button onclick="switchTab('clients')" class="ciel-btn !py-1 !px-3 !text-[10px]">VIEW AGENTS</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 font-mono text-[13px] text-[#00ffd6] leading-relaxed break-words" id="console-output">
                <!-- Logs Inject -->
            </div>
        </div>

    </div> <!-- End Main Wrapper -->

    <!-- Modals -->
    <div id="add-modal" class="overlay hide">
        <div class="glass-panel p-8 w-full max-w-md mx-4">
            <h2 class="text-xl font-bold mb-6 text-white text-center">REGISTER NODE</h2>
            <input type="text" id="new-key" placeholder="API Key (sk-...)" class="ciel-input w-full mb-4">
            <input type="number" id="new-priority" value="0" placeholder="Priority (High = First)" class="ciel-input w-full mb-8">
            <div class="flex gap-4">
                <button onclick="hideAddModal()" class="ciel-btn flex-1">CANCEL</button>
                <button onclick="addKey()" class="ciel-btn primary flex-1">EXECUTE</button>
            </div>
        </div>
    </div>
    
    <div id="client-modal" class="overlay hide">
        <div class="glass-panel p-8 w-full max-w-md mx-4">
            <h2 class="text-xl font-bold mb-6 text-white text-center">GENERATE AGENT KEY</h2>
            <input type="text" id="new-client-name" placeholder="Agent ID (e.g. Hermes)" class="ciel-input w-full mb-8">
            <div class="flex gap-4">
                <button onclick="hideClientModal()" class="ciel-btn flex-1">CANCEL</button>
                <button onclick="addClientKey()" class="ciel-btn primary flex-1">GENERATE</button>
            </div>
        </div>
    </div>

    <!-- Client Agents List Modal (Triggered from Terminal header) -->
    <div id="client-list-modal" class="overlay hide">
        <div class="glass-panel p-6 w-full max-w-3xl mx-4 max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 class="text-xl font-bold text-white">CLIENT AGENTS</h2>
                <button onclick="document.getElementById('client-list-modal').classList.add('hide')" class="text-slate-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="overflow-y-auto flex-1 grid grid-cols-1 md:grid-cols-2 gap-4" id="client-keys-grid">
                <!-- Client list injected -->
            </div>
        </div>
    </div>

    <div id="password-modal" class="overlay hide">
        <div class="glass-panel p-8 w-full max-w-md mx-4">
            <h2 class="text-xl font-bold mb-6 text-white text-center">SYSTEM OVERRIDE</h2>
            <input type="password" id="new-password" placeholder="New Access Pin" class="ciel-input w-full mb-8 focus:!border-red-400">
            <div class="flex gap-4">
                <button onclick="hidePasswordModal()" class="ciel-btn flex-1">CANCEL</button>
                <button onclick="changePassword()" class="ciel-btn !border-red-500 !text-red-400 hover:!bg-red-500 hover:!text-white flex-1">UPDATE</button>
            </div>
        </div>
    </div>

    <div id="new-client-key-modal" class="overlay hide">
        <div class="glass-panel p-8 w-full max-w-md mx-4 border border-[#00ffd6]">
            <h2 class="text-xl font-bold mb-2 text-[#00ffd6] text-center">AGENT INITIALIZED</h2>
            <p class="text-[12px] text-red-400 font-mono mb-6 text-center">CRITICAL: COPY TOKEN NOW. NO RECOVERY.</p>
            <div class="flex items-center gap-2 mb-8">
                <input type="text" id="display-new-client-key" readonly class="ciel-input flex-1 text-center text-[#00ffd6] text-lg font-bold">
                <button onclick="copyToClipboard('display-new-client-key')" class="ciel-btn primary" title="Copy">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
            </div>
            <button onclick="closeNewClientKeyModal()" class="ciel-btn w-full">ACKNOWLEDGE</button>
        </div>
    </div>

    <script>
        let sessionToken = localStorage.getItem('ciel_session') || '';
        let logInterval = null;

        // Custom Toasts
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `
                <svg class="w-5 h-5 shrink-0 ${type === 'error' ? 'text-red-500' : 'text-[#00ffd6]'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${type === 'error' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'}
                </svg>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function toggleMenu() {
            const menu = document.getElementById('dropdown-menu');
            if (menu.classList.contains('hide')) { menu.classList.remove('hide'); } 
            else { menu.classList.add('hide'); }
        }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('dropdown-menu');
            if(!menu.classList.contains('hide') && !e.target.closest('.relative')) { menu.classList.add('hide'); }
        });

        function copyText(text) { navigator.clipboard.writeText(text).then(() => showToast('COPIED TO CLIPBOARD')).catch(() => showToast('COPY FAILED', 'error')); }
        function copyToClipboard(elementId) { copyText(document.getElementById(elementId).value); }

        window.onload = async () => {
            if (sessionToken) {
                try {
                    const res = await fetch('/admin/live_status', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                    if (res.ok) showDashboard(); else logout();
                } catch (e) { logout(); }
            }
        };

        function showDashboard() {
            document.getElementById('login-overlay').classList.add('hide');
            const wrapper = document.getElementById('main-wrapper');
            wrapper.classList.remove('hide');
            setTimeout(() => wrapper.classList.remove('opacity-0'), 50);
            refreshAll();
            startLogPolling();
        }

        async function login() {
            const pin = document.getElementById('pin-input').value;
            try {
                const res = await fetch('/admin/auth', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                if (res.ok) {
                    const data = await res.json();
                    sessionToken = data.token;
                    localStorage.setItem('ciel_session', sessionToken);
                    showDashboard();
                    showToast('SYSTEM UNLOCKED');
                } else showToast('AUTH REJECTED', 'error');
            } catch (e) { showToast('NETWORK ERROR', 'error'); }
        }

        function logout() {
            sessionToken = ''; localStorage.removeItem('ciel_session');
            if(logInterval) clearInterval(logInterval);
            document.getElementById('main-wrapper').classList.add('hide', 'opacity-0');
            document.getElementById('login-overlay').classList.remove('hide');
            document.getElementById('pin-input').value = '';
            showToast('LOGGED OUT');
        }

        function refreshAll() { refreshData(); refreshClientKeys(); refreshAnalytics(); }

        async function refreshAnalytics() {
            try {
                const res = await fetch('/admin/analytics', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                if(!res.ok) return;
                const data = await res.json();
                document.getElementById('ana-today').innerText = data.today;
                document.getElementById('ana-week').innerText = data.this_week;
                document.getElementById('ana-month').innerText = data.this_month;
                
                const max = Math.max(data.this_month * 2, 50); 
                document.getElementById('bar-today').style.width = Math.min((data.today / max) * 100 * 30, 100) + '%';
                document.getElementById('bar-week').style.width = Math.min((data.this_week / max) * 100 * 4, 100) + '%';
                document.getElementById('bar-month').style.width = Math.min((data.this_month / max) * 100, 100) + '%';
            } catch(e) {}
        }

        async function refreshData() {
            try {
                const res = await fetch('/admin/keys', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                if(res.status === 401) return logout();
                const data = await res.json();
                
                const grid = document.getElementById('keys-grid');
                grid.innerHTML = '';
                
                let total = 0, active = 0;

                data.keys.forEach((k, index) => {
                    const isHealthy = k.balance > 0;
                    if(isHealthy) active++;
                    total += (isHealthy ? k.balance : 0);
                    const isPri = k.priority > 0;
                    const idPrefix = `key-${index}`;
                    
                    grid.innerHTML += `
                        <div class="parent-3d">
                            <div class="card-3d ${!isHealthy ? 'dead' : ''} ${isPri && isHealthy ? 'priority' : ''}">
                                <div class="card-glass"></div>
                                <div class="card-content">
                                    <div class="flex items-center gap-2 mb-1">
                                        <div class="w-3 h-3 rounded-full ${isHealthy ? 'bg-[#00ffd6] shadow-[0_0_8px_#00ffd6]' : 'bg-red-500'}"></div>
                                        <span class="card-title !mb-0 !text-[22px] !text-${isPri ? 'white' : '[#0f172a]'}">NODE_${index < 10 ? '0'+index : index}</span>
                                    </div>
                                    <span class="card-text !text-${isPri ? 'slate-200' : 'slate-800'} mt-2 flex items-center gap-2">
                                        ${k.key.substring(0, 12)}...${k.key.substring(k.key.length - 4)}
                                        <svg onclick="copyText('${k.key}')" class="w-4 h-4 cursor-pointer hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                    </span>
                                    <div class="mt-4">
                                        <div class="text-xs font-mono !text-${isPri ? 'slate-300' : 'slate-600'}">BALANCE</div>
                                        <div class="text-3xl font-bold font-mono !text-${isPri ? 'white' : 'black'}" id="bal-${idPrefix}">${k.balance.toFixed(2)}</div>
                                    </div>
                                </div>
                                <div class="card-bottom">
                                    <button onclick="testKeyInline('${k.key}', 'bal-${idPrefix}')" class="card-btn">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                        VERIFY
                                    </button>
                                    <button onclick="deleteKey('${k.key}')" class="card-btn danger">
                                        PURGE
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('stat-active-keys').innerText = active;
                document.getElementById('stat-total-pollen').innerText = total.toFixed(2);
            } catch(e) {}
        }

        async function testKeyInline(key, elementId) {
            const el = document.getElementById(elementId);
            const orig = el.innerText;
            el.innerText = 'SYNC..'; 
            try {
                const res = await fetch(`/admin/test/${key}`, { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                const data = await res.json();
                if (data.success) { el.innerText = data.balance.toFixed(2); showToast('VERIFIED'); refreshAll(); }
                else { el.innerText = '0.00'; showToast('DEAD', 'error'); }
            } catch (err) { el.innerText = orig; showToast('ERR', 'error'); }
        }

        async function refreshClientKeys() {
            try {
                const res = await fetch('/admin/client-keys', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                const data = await res.json();
                const grid = document.getElementById('client-keys-grid');
                grid.innerHTML = '';
                data.keys.forEach(k => {
                    grid.innerHTML += `
                        <div class="glass-panel p-4 flex items-center justify-between border-l-4 border-[#00ffd6]">
                            <div>
                                <h4 class="font-bold tracking-wider">${k.name}</h4>
                                <div class="font-mono text-sm text-slate-400 mt-1">${k.key.substring(0,8)}...${k.key.substring(k.key.length-4)}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="copyText('${k.key}')" class="ciel-btn !p-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                                <button onclick="deleteClientKey('${k.key}')" class="ciel-btn danger !p-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                            </div>
                        </div>
                    `;
                });
            } catch(e) {}
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/admin/live_status', { headers: { 'Authorization': `Bearer ${sessionToken}` }});
                if (res.ok) {
                    const data = await res.json();
                    const consoleDiv = document.getElementById('console-output');
                    let wasAtBottom = (consoleDiv.scrollHeight - consoleDiv.scrollTop <= consoleDiv.clientHeight + 10);
                    consoleDiv.innerHTML = data.logs.join('<br>') + '<br><span class="animate-pulse">_</span>';
                    if (wasAtBottom) consoleDiv.scrollTop = consoleDiv.scrollHeight;
                }
            } catch (e) {}
        }
        function startLogPolling() { if(logInterval) clearInterval(logInterval); fetchLogs(); logInterval = setInterval(fetchLogs, 4000); }

        function showAddModal() { document.getElementById('add-modal').classList.remove('hide'); }
        function hideAddModal() { document.getElementById('add-modal').classList.add('hide'); document.getElementById('new-key').value=''; }
        function switchTab(tab) { if(tab==='clients') document.getElementById('client-list-modal').classList.remove('hide'); }
        function showClientModal() { document.getElementById('client-modal').classList.remove('hide'); }
        function hideClientModal() { document.getElementById('client-modal').classList.add('hide'); document.getElementById('new-client-name').value=''; }
        function showPasswordModal() { document.getElementById('password-modal').classList.remove('hide'); }
        function hidePasswordModal() { document.getElementById('password-modal').classList.add('hide'); document.getElementById('new-password').value=''; }
        function closeNewClientKeyModal() { document.getElementById('new-client-key-modal').classList.add('hide'); }

        async function addKey() {
            const key = document.getElementById('new-key').value;
            const priority = document.getElementById('new-priority').value;
            if(!key) return showToast('KEY REQUIRED', 'error');
            await fetch('/admin/keys', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` }, body: JSON.stringify({ key, priority: parseInt(prio) }) });
            hideAddModal(); refreshData(); showToast('NODE ADDED');
        }
        async function deleteKey(key) {
            if(!confirm('PURGE NODE?')) return;
            await fetch(`/admin/keys/${key}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${sessionToken}` }});
            refreshData(); showToast('NODE PURGED');
        }
        async function addClientKey() {
            const name = document.getElementById('new-client-name').value;
            if(!name) return showToast('NAME REQUIRED', 'error');
            const res = await fetch('/admin/client-keys', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` }, body: JSON.stringify({ name }) });
            if(res.ok) {
                const data = await res.json();
                hideClientModal();
                document.getElementById('display-new-client-key').value = data.key;
                document.getElementById('new-client-key-modal').classList.remove('hide');
                refreshClientKeys(); showToast('AGENT ADDED');
            }
        }
        async function deleteClientKey(key) {
            if(!confirm('CRITICAL: PURGE AGENT?')) return;
            await fetch(`/admin/client-keys/${key}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${sessionToken}` }});
            refreshClientKeys(); showToast('AGENT PURGED');
        }
        async function changePassword() {
            const np = document.getElementById('new-password').value;
            if(!np) return showToast('PASS REQUIRED', 'error');
            const res = await fetch('/admin/password', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${sessionToken}`}, body:JSON.stringify({new_password:np}) });
            if(res.ok) { showToast('PASS UPDATED'); hidePasswordModal(); }
        }
    </script>
</body>
</html>
